<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get a Quote | Livano Freight Services LLC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

.navbar{
    background:#062C54;
}

.navbar-brand{
    color:#D4AF37 !important;
    font-weight:bold;
    font-size:28px;
}

.quote-section{
    padding:70px 0;
}

.quote-box{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h2{
    color:#062C54;
    margin-bottom:30px;
}

.btn-gold{
    background:#D4AF37;
    color:white;
    border:none;
}

.btn-gold:hover{
    background:#062C54;
    color:white;
}

footer{
    background:#062C54;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:60px;
}

</style>

</head>

<body>

<a class="navbar-brand d-flex align-items-center" href="index.html">



    <img src="LIVANO LOGO.png" 

         alt="Livano Freight Services LLC"

         class="logo">



</a>

</div>

</nav>

<section class="quote-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="quote-box">

<h2 class="text-center">Request a Freight Quote</h2>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input type="text" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Company Name</label>

<input type="text" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input type="tel" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Origin</label>

<input type="text" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Destination</label>

<input type="text" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Freight Type</label>

<select class="form-select">

<option>Sea Freight</option>
<option>Air Freight</option>
<option>Road Freight</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Cargo Weight (kg)</label>

<input type="number" class="form-control">

</div>

<div class="mb-3">

<label>Additional Information</label>

<textarea class="form-control" rows="5"></textarea>

</div>

<div class="text-center">

<button type="submit" class="btn btn-gold btn-lg">

Request Quote

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</section>

<footer>

© 2026 Livano Freight Services LLC<br>

Moving Trade Forward.

</footer>

</body>

</html>
