<section class="contact-section">

<div class="container">

<h2 class="text-center mb-5">Contact Us</h2>

<div class="row">

<div class="col-lg-4">

<div class="info-card">
<i class="fas fa-map-marker-alt"></i>
<h5>Office Address</h5>
<p>
Dubai, United Arab Emirates
</p>
</div>

<div class="info-card">
<i class="fas fa-phone"></i>
<h5>Phone</h5>
<p>+971 XX XXX XXXX</p>
</div>

<div class="info-card">
<i class="fas fa-envelope"></i>
<h5>Email</h5>
<p>info@livano.com</p>
</div>

</div>

<div class="col-lg-8">

<div class="contact-box">

<h4 class="mb-4">Send Us a Message</h4>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<input type="text"
class="form-control"
placeholder="Your Name"
required>
</div>

<div class="col-md-6 mb-3">
<input type="email"
class="form-control"
placeholder="Email Address"
required>
</div>

</div>

<div class="mb-3">
<input type="text"
class="form-control"
placeholder="Subject">
</div>

<div class="mb-3">
<textarea class="form-control"
rows="6"
placeholder="Message"></textarea>
</div>

<button class="btn btn-gold btn-lg">
Send Message
</button>

</form>

</div>

</div>
